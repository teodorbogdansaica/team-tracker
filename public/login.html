<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Tracker — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0f1117; --surface: #1a1d27; --border: #2e3249; --text: #e2e8f0; --text-dim: #8892a4; --accent: #4F86C6; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px 36px; width: 360px; max-width: 95vw; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    h1 span { color: var(--accent); }
    .subtitle { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 28px; }
    label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; margin-top: 16px; }
    input { width: 100%; background: #22263a; border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 10px 12px; font-size: 0.9rem; outline: none; }
    input:focus { border-color: var(--accent); }
    button { width: 100%; margin-top: 24px; background: var(--accent); color: #fff; border: none; border-radius: 7px; padding: 11px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    button:hover { filter: brightness(1.1); }
    .error { margin-top: 14px; color: #f09497; font-size: 0.82rem; text-align: center; min-height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Team <span>Tracker</span></h1>
    <p class="subtitle">Sign in to your account</p>
    <label>Username</label>
    <input type="text" id="username" placeholder="your-username" autocomplete="username" />
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    <button onclick="login()">Sign in</button>
    <div class="error" id="error"></div>
  </div>
  <script>
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      document.getElementById('error').textContent = '';
      if (!username || !password) { document.getElementById('error').textContent = 'Enter username and password'; return; }
      const res = await fetch('/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (res.ok) { window.location.href = '/'; }
      else { document.getElementById('error').textContent = data.error || 'Login failed'; }
    }
  </script>
</body>
</html>
